<!DOCTYPE html>
<html lang="en">

    <title>Image and Music Generator</title>

</head>

        <h1>Image and Music Generator</h1>

            <button onclick="showContent(0)">Button 1</button>
            <button onclick="showContent(1)">Button 2</button>
            <button onclick="showContent(2)">Button 3</button>
            <button onclick="showContent(3)">Button 4</button>
            <button onclick="showContent(4)">Button 5</button>
            <button onclick="showContent(5)">Button 6</button>
            <button onclick="showContent(6)">Button 7</button>
            <button onclick="showContent(7)">Button 8</button>
            <button onclick="showContent(8)">Button 9</button>
            <button onclick="showContent(9)">Button 10</button>
        </div>
    </div>
    <audio id="audioPlayer" src="" preload="auto"></audio>
    <script src="script.js"></script>
</body>
</html>
